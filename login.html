<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Member Login — The Multiplier Method</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0a0a0a; --ink: #171717; --surface: #1c1c1c;
      --border: #242424; --muted: #333333;
      --text-dim: #a8a8a8; --text: #d4d4d4; --white: #f5f5f5;
      --accent: #e8c547; --accent-dim: rgba(232,197,71,0.12);
      --accent-border: rgba(232,197,71,0.3); --red: #e05252;
      --font-head: 'Cormorant Garamond', serif;
      --font-body: 'Crimson Pro', serif;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black); color: var(--text);
      font-family: var(--font-body); font-size: 18px;
      line-height: 1.75; -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,10,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px; display: flex; align-items: center; gap: 32px; height: 60px;
    }
    .nav-logo {
      font-family: var(--font-head); font-weight: 800; font-size: 15px;
      color: var(--white); text-decoration: none; letter-spacing: -0.02em;
    }
    .nav-logo em { color: var(--accent); font-style: normal; }
    .nav-links { display: flex; gap: 28px; list-style: none; margin-left: auto; }
    .nav-links a { font-size: 14px; font-weight: 500; color: var(--text-dim); text-decoration: none; letter-spacing: 0.02em; transition: color 0.15s; }
    .nav-links a:hover { color: var(--white); }

    main {
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 60px 24px;
    }

    .login-card {
      width: 100%; max-width: 420px;
    }
    .login-eyebrow {
      font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
    }
    .login-heading {
      font-family: var(--font-head); font-size: 36px; font-weight: 700;
      color: var(--white); letter-spacing: -0.02em; line-height: 1.1;
      margin-bottom: 10px;
    }
    .login-sub {
      font-size: 16px; color: var(--text-dim); margin-bottom: 36px;
      line-height: 1.6;
    }

    .form-field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .form-label {
      font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--text-dim);
    }
    .form-input {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 12px 16px;
      font-family: var(--font-body); font-size: 17px; color: var(--white);
      outline: none; transition: border-color 0.15s;
      width: 100%;
    }
    .form-input:focus { border-color: var(--accent-border); }
    .form-input::placeholder { color: var(--muted); }

    .error-msg {
      font-size: 14px; color: var(--red); margin-bottom: 16px;
      display: none; padding: 10px 14px;
      background: rgba(224,82,82,0.08); border: 1px solid rgba(224,82,82,0.2);
      border-radius: 3px;
    }
    .error-msg.show { display: block; }

    .btn-login {
      width: 100%; background: var(--accent); color: var(--black);
      font-family: var(--font-head); font-weight: 700;
      font-size: 15px; letter-spacing: 0.05em; text-transform: uppercase;
      padding: 14px; border-radius: 3px; border: none;
      cursor: pointer; transition: opacity 0.15s; margin-top: 8px;
    }
    .btn-login:hover { opacity: 0.85; }

    .login-divider {
      border: none; border-top: 1px solid var(--border);
      margin: 32px 0;
    }
    .login-enroll {
      text-align: center; font-size: 15px; color: var(--text-dim);
    }
    .login-enroll a {
      color: var(--accent); text-decoration: none; font-weight: 600;
    }
    .login-enroll a:hover { text-decoration: underline; }

    footer {
      border-top: 1px solid var(--border); padding: 20px 40px;
      font-size: 13px; color: var(--text-dim); text-align: center;
    }

    @media (max-width: 480px) {
      nav { padding: 0 20px; }
      .login-heading { font-size: 28px; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo" aria-label="Channel Ready AE — home"><svg width="20" height="18" viewBox="0 0 22 20" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false" style="vertical-align:-3px;margin-right:10px;flex-shrink:0"><rect x="0" y="16" width="2" height="4" fill="#e8c547"/><rect x="4" y="12" width="2" height="8" fill="#e8c547"/><rect x="8" y="8" width="2" height="12" fill="#e8c547"/><rect x="12" y="4" width="2" height="16" fill="#e8c547"/><rect x="16" y="0" width="2" height="20" fill="#e8c547"/></svg>Channel Ready <em>AE</em><span style="color:#e8c547;font-size:0.55em;vertical-align:0.5em;margin-left:1px;letter-spacing:0">™</span></a>
  <ul class="nav-links">
    <li><a href="curriculum.html">Curriculum</a></li>
    <li><a href="assessment.html">Assessment</a></li>
    <li><a href="business_plan.html">Business Plan</a></li>
    <li><a href="faq.html">FAQ</a></li>
  </ul>
</nav>

<main>
  <div class="login-card">
    <p class="login-eyebrow">Member Access</p>
    <h1 class="login-heading">Welcome back.</h1>
    <p class="login-sub">Enter your credentials to access the curriculum.</p>

    <div class="error-msg" id="errorMsg">Incorrect email or password. Please try again.</div>

    <div class="form-field">
      <label class="form-label" for="loginEmail">Email</label>
      <input class="form-input" type="email" id="loginEmail" placeholder="you@company.com" autocomplete="email" />
    </div>
    <div class="form-field">
      <label class="form-label" for="loginPassword">Password</label>
      <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-login" onclick="handleLogin()">Access the Curriculum</button>

    <hr class="login-divider" />
    <p class="login-enroll">Not enrolled yet? <a href="index.html#apply">Apply for the next cohort &rarr;</a></p>
  </div>
</main>

<footer>&copy; 2026 Partna Group LLC &mdash; The Multiplier Method&trade;</footer>

<script>
  var MM_KEY = 'mm_unlocked';
  var MM_PASS = 'channelready';

  // Redirect already-logged-in users
  if (localStorage.getItem(MM_KEY) === '1') {
    window.location.href = 'curriculum.html';
  }

  function handleLogin() {
    var email = document.getElementById('loginEmail').value.trim();
    var password = document.getElementById('loginPassword').value;
    var errorEl = document.getElementById('errorMsg');

    var validEmail = email.length > 0 && email.indexOf('@') !== -1;
    var validPassword = password === MM_PASS;

    if (validEmail && validPassword) {
      localStorage.setItem(MM_KEY, '1');
      errorEl.classList.remove('show');
      window.location.href = 'curriculum.html';
    } else {
      errorEl.classList.add('show');
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginPassword').focus();
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
